name: Bump Homebrew formula

# Builds a Python sdist for llmind-cli, uploads it as a GitHub release asset,
# then bumps dmitryrollins/homebrew-llmind to point at it.
#
# Why an sdist instead of the auto-generated tag tarball?
# `brew update-python-resources` runs `pip install` against the source URL to
# resolve the transitive dependency tree. The auto-archive of this monorepo
# has pyproject.toml at llmind-cli/pyproject.toml — pip doesn't know to
# descend, so resolution fails. An sdist has pyproject.toml at the root.
#
# Required secret (Settings → Secrets → Actions on this repo):
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with Contents: write + Pull requests:
#                        write on dmitryrollins/homebrew-llmind.

on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: CLI release tag (e.g. cli-v0.2.0)
        required: true
        type: string

permissions:
  contents: write   # needed to create the release and upload the sdist asset

jobs:
  bump:
    runs-on: macos-latest
    env:
      TAP_OWNER: dmitryrollins
      TAP_NAME: llmind
      TAP_REPO: dmitryrollins/homebrew-llmind
      FORMULA: llmind-cli

    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [[ "$tag" != cli-v* ]]; then
            echo "::error::Tag '$tag' must start with 'cli-v'"
            exit 1
          fi
          version="${tag#cli-v}"
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout LLMind source at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          path: src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        id: sdist
        working-directory: src/llmind-cli
        run: |
          set -euo pipefail
          pip install --upgrade build
          python -m build --sdist
          sdist=$(ls dist/llmind_cli-*.tar.gz | head -n 1)
          [[ -n "$sdist" ]] || { echo "::error::sdist not produced"; exit 1; }
          name=$(basename "$sdist")
          path="$PWD/$sdist"
          sha=$(shasum -a 256 "$path" | awk '{print $1}')
          {
            echo "path=$path"
            echo "name=$name"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists, upload sdist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          SDIST_PATH: ${{ steps.sdist.outputs.path }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # If a prior run left the release in draft state (happens when the
            # tag is deleted/recreated between runs), publish it — otherwise
            # the public download URL returns 404 and audit fails.
            is_draft=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft --jq .isDraft)
            if [[ "$is_draft" == "true" ]]; then
              echo "Found draft release for $TAG; publishing..."
              gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
            fi
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --target "$GITHUB_SHA" \
              --title "llmind-cli ${VERSION}" \
              --notes "Automated release built by .github/workflows/release-homebrew.yml."
          fi
          gh release upload "$TAG" --repo "${{ github.repository }}" \
            "$SDIST_PATH" --clobber
          # GitHub's release-asset CDN can return 404 for ~10–20 s after upload
          # while the asset propagates. Wait so the audit step's URL check
          # (and brew install's download) succeeds.
          sleep 30

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Move tap into Homebrew prefix
        id: tap
        run: |
          set -euo pipefail
          target="$(brew --repository)/Library/Taps/${TAP_OWNER}/homebrew-${TAP_NAME}"
          mkdir -p "$(dirname "$target")"
          mv "$GITHUB_WORKSPACE/tap" "$target"
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - name: Sync formula skeleton from source repo
        env:
          TAP_PATH: ${{ steps.tap.outputs.path }}
        run: |
          set -euo pipefail
          # Copy the canonical formula from the tagged source tree into the tap.
          # Structural changes (new depends_on, livecheck tweaks, etc.) flow
          # this way; sed below patches in the per-release url/sha/version.
          cp "$GITHUB_WORKSPACE/src/packaging/homebrew/llmind-cli.rb" \
             "$TAP_PATH/Formula/llmind-cli.rb"

      - name: Patch url and sha256
        env:
          URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.sdist.outputs.name }}
          SHA: ${{ steps.sdist.outputs.sha }}
          FORMULA_PATH: ${{ steps.tap.outputs.path }}/Formula/llmind-cli.rb
        run: |
          set -euo pipefail
          # Match exactly two leading spaces so we don't touch indented
          # resource blocks. brew parses the version from the URL filename,
          # so no `version` directive to patch.
          /usr/bin/sed -i '' -E "s|^  url \"[^\"]*\"|  url \"${URL}\"|" "$FORMULA_PATH"
          /usr/bin/sed -i '' -E "s|^  sha256 \"[^\"]*\"|  sha256 \"${SHA}\"|" "$FORMULA_PATH"

      # Resources are static (committed in packaging/homebrew/llmind-cli.rb).
      # `brew update-python-resources` was tried but its --uploaded-prior-to=24h
      # reproducibility cutoff makes runs non-deterministic — pip dry-run fails
      # whenever a transitive dep can't be resolved within the cutoff. Regenerate
      # locally with packaging/homebrew/regenerate_resources.sh when deps change.

      - name: Audit
        # Non-strict audit: strict mode flags `version` as redundant with the
        # version brew parses from the sdist filename, but `update-python-resources`
        # actually requires an explicit `version` directive. Run audit locally with
        # `--strict` for the deeper stylistic checks.
        run: brew audit --online "${TAP_OWNER}/${TAP_NAME}/${FORMULA}"

      - name: Smoke install + test
        run: |
          brew install --build-from-source "${TAP_OWNER}/${TAP_NAME}/${FORMULA}"
          brew test "${TAP_OWNER}/${TAP_NAME}/${FORMULA}"

      - name: Open PR in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.sdist.outputs.name }}
          SHA: ${{ steps.sdist.outputs.sha }}
        working-directory: ${{ steps.tap.outputs.path }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Formula already up to date for ${TAG}; nothing to PR."
            exit 0
          fi
          branch="bump/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/llmind-cli.rb
          git commit -m "${FORMULA} ${VERSION}"
          git push -u origin "$branch"
          gh pr create \
            --repo "${TAP_REPO}" \
            --base main \
            --head "$branch" \
            --title "${FORMULA} ${VERSION}" \
            --body "$(cat <<EOF
          Auto-bump for tag \`${TAG}\`.

          - URL: ${URL}
          - SHA256: \`${SHA}\`

          Python resources regenerated via \`brew update-python-resources\`.
          Audit, install, and \`brew test\` passed in CI.
          EOF
          )"
